<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diamond Hats | Gorras</title>

    <link rel="stylesheet" href="gorras.css">

</head>

<body>

<header class="header">

    <h1>Catálogo Hats</h1>

    <button id="volver">
        ⬅ Volver al Inicio
       <a href="tienda.html"> 
        </a> 
    </button>

      <button id="abrir-carrito">

            🛒 <span id="contador">0</span>

        </button>

</header>



<main>

    <div id="contenedor-productos">

    </div>

     <!-- CARRITO LATERAL -->

    <aside id="carrito">


        <div class="carrito-header">

            <h2>
                Mi carrito 
            </h2>


            <button id="cerrar-carrito">
                ✖
            </button>

        </div>



        <div id="productos-carrito">

            <!-- Aquí aparecerán las gorras -->

        </div>



        <div class="carrito-footer">


            <h3>
                Total:
                $<span id="total">0</span> MXN
            </h3>


            <button class="finalizar">

                Finalizar compra

            </button>


        </div>


    </aside>


</main>

<script src="gorras.js"></script>
<script src="carrito.js"></script>

</body>

</html>

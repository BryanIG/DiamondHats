<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Descargar Ticket - Diamond Hats</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f4f4;
            color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            background: #cca142;
            color: #fff;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.3s;
        }

        .btn:hover {
            background: #b08c35;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>💎 DIAMOND HATS</h1>
        <p>Has escaneado un ticket de compra válido.</p>
        <p style="font-size: 13px; color: #666; margin-top: 15px;">ID Orden: <span id="ordenId"
                style="font-weight: bold; color: #111;">Cargando...</span></p>
        <a href="#" class="btn" onclick="window.print()">Descargar Copia (PDF)</a>
    </div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (id) {
            document.getElementById('ordenId').textContent = id;
            // Optionally auto-print
            setTimeout(() => {
                window.print();
            }, 1000);
        } else {
            document.getElementById('ordenId').textContent = "Número de orden no encontrado.";
        }
    </script>
</body>

</html>
